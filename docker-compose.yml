version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pskreporter-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=pskreporter123
      - MYSQL_DATABASE=pskreporter
      - MYSQL_USER=pskuser
      - MYSQL_PASSWORD=pskpass123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql-data: